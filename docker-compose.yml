services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holink
      POSTGRES_USER: holink
      POSTGRES_PASSWORD: holink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holink -d holink"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/holink
      SPRING_DATASOURCE_USERNAME: holink
      SPRING_DATASOURCE_PASSWORD: holink
      JWT_SECRET: holink-production-secret-change-me-min-256-bits-long!!
      IP_HASH_SALT: holink-ip-hash-salt-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
